<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>PSI Operations Platform</title>
    <link rel="stylesheet" href="style.css?v=2026-07-13-planning-operator-finish-v1">
    <script>
        window.APP_VERSION = "2026-07-13-planning-operator-finish-v1";
    </script>
</head>

<body style="display: none;">

    <main class="container">

        <header class="header">
            <div class="header-logo">
                <img src="images/logo.png" alt="Swagelok Chile">
                <div class="logo-texto">Swagelok Chile</div>
            </div>

            <div class="header-info">
                <h1 id="pageTitle">
                    PSI Operations Platform
                </h1>
                <p id="pageSubtitle">
                    Seguimiento automático de certificaciones, planificación y gestión PSI.
                </p>
            </div>

            <button id="logoutBtn" class="logout-btn">Cerrar sesión</button>
        </header>

        <nav class="module-tabs"></nav>

        <!-- CERTIFICACIONES -->
        <section id="certificacionesModule" class="module-section active">

            <section id="resumen" class="resumen"></section>

            <section class="buscador">
                <input
                    type="text"
                    id="busqueda"
                    placeholder="Buscar por persona, CP o descripción..."
                >
            </section>

            <section id="personas" class="personas">
                <p>Cargando datos...</p>
            </section>

        </section>

        <!-- PLANIFICACIÓN -->
        <section id="planificacionModule" class="module-section"></section>

        <!-- MÓDULOS OCULTOS -->
        <section id="produccionModule" class="module-section"></section>
        <section id="cotizacionesModule" class="module-section"></section>
        <section id="historialModule" class="module-section"></section>
        <section id="parametrosModule" class="module-section"></section>

    </main>

    <!-- AUTENTICACIÓN -->
    <script type="module" src="auth/auth.js?v=2026-07-13-planning-operator-finish-v1"></script>

    <!-- COMPARTIDOS -->
    <script src="shared/utils.js?v=2026-07-13-planning-operator-finish-v1"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script type="module" src="shared/app.js?v=2026-07-13-planning-operator-finish-v1"></script>

    <!-- CERTIFICACIONES -->
    <script src="modules/certifications/certifications.js?v=2026-07-13-planning-operator-finish-v1"></script>

    <!-- PLANIFICACIÓN -->
    <script src="modules/planning/planning-engine.js?v=2026-07-13-planning-operator-finish-v1"></script>
    <script type="module" src="modules/planning/planning-services.js?v=2026-07-13-planning-operator-finish-v1"></script>
    <script src="modules/planning/planning-ui.js?v=2026-07-13-planning-operator-finish-v1"></script>
    <script src="modules/planning/planning.js?v=2026-07-13-planning-operator-finish-v1"></script>

    <!-- FIRESTORE -->
    <script type="module" src="auth/firestore.js?v=2026-07-13-planning-operator-finish-v1"></script>

</body>

</html>
